; ============================================================
; osTicket v1.18.3 - PHP Configuration
; ============================================================

; ============================================================
; Memory & Execution Settings
; ============================================================

; Maximum amount of memory a script may consume
memory_limit = 256M

; Maximum execution time of each script, in seconds
max_execution_time = 300

; Maximum time input data is allowed to be processed
max_input_time = 300

; ============================================================
; File Upload Settings
; ============================================================

; Maximum allowed size of uploaded files
upload_max_filesize = 64M

; Maximum size of POST data that PHP will accept
post_max_size = 64M

; Maximum number of files that can be uploaded in one request
max_file_uploads = 20

; ============================================================
; Date & Time Settings
; ============================================================

; Default timezone untuk aplikasi
date.timezone = Asia/Jakarta

; ============================================================
; Session Settings
; ============================================================

; Session lifetime in seconds
session.gc_maxlifetime = 86400

; Session path untuk persistent storage
session.save_path = "/var/lib/php/sessions"

; Enable strict session mode
session.use_strict_mode = 1

; Use only cookies for sessions
session.use_only_cookies = 1

; HttpOnly flag untuk security
session.cookie_httponly = 1

; SameSite cookie attribute
session.cookie_samesite = Lax

; ============================================================
; Output Buffering
; ============================================================

; Enable output buffering
output_buffering = On

; Output buffer size
output_buffering_size = 4096

; ============================================================
; Error Handling
; ============================================================

; Error reporting level - development
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Display errors on screen (set to 0 untuk production)
display_errors = 0

; Log errors to file
log_errors = 1

; Path to error log
error_log = /var/log/apache2/php_error.log

; ============================================================
; String Settings
; ============================================================

; Default charset untuk string functions
default_charset = "UTF-8"

; ============================================================
; Locale Settings
; ============================================================

; Locale untuk localization
intl.default_locale = id_ID

; ============================================================
; Database Settings
; ============================================================

; MySQLi settings
mysqli.max_connections = 100
mysqli.max_links = -1
mysqli.allow_local_infile = On
mysqli.allow_persistent = 1

; PDO settings
pdo.default_case = NATURAL

; ============================================================
; Performance & Caching
; ============================================================

; OPcache settings untuk production
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.enable_file_override = 1
opcache.max_file_size = 0

; ============================================================
; Security Settings
; ============================================================

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Allow file uploads
file_uploads = On

; Restrict file access
open_basedir = /var/www/html:/tmp:/var/tmp

; Display PHP version
expose_php = 0

; ============================================================
; Variable Settings
; ============================================================

; Maximum variables accepted in GET, POST dan COOKIE
max_input_vars = 5000

; ============================================================
; Default MIME Type
; ============================================================

default_mimetype = "text/html"

; ============================================================
; URL Include Settings
; ============================================================

; Allow remote file inclusion (disable untuk production)
allow_url_include = 0
allow_url_fopen = 1

; ============================================================
; Display Startup Errors
; ============================================================

display_startup_errors = 0

; ============================================================
; SMTP Settings (Optional - for email)
; ============================================================

; SMTP server untuk mail functions
; SMTP = localhost
; smtp_port = 25

; ============================================================
; Include Path
; ============================================================

include_path = "."

; ============================================================
; Type Checking
; ============================================================

; Type checking untuk function arguments
strict_types = 0
