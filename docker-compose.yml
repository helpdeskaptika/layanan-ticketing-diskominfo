version: '3.9'

services:
  # Service Web - osTicket dengan PHP Apache
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osticket_web
    ports:
      - "${WEB_PORT}:80"
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_PORT=${MYSQL_PORT}
      - TZ=${TIMEZONE}
    volumes:
      - ./src/upload:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/osticket.ini:ro
      - osticket_logs:/var/log/apache2
      - osticket_sessions:/var/lib/php/sessions
    networks:
      - osticket_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Service Database - MariaDB berbasis Alpine
  db:
    image: mariadb:10.11
    container_name: osticket_db
    ports:
      - "${DB_PORT}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TIMEZONE}
    volumes:
      - osticket_db_data:/var/lib/mysql
      - ./db_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - osticket_network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=256M
      - --wait_timeout=28800
      - --interactive_timeout=28800
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Service phpMyAdmin - Database Management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: osticket_phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      - PMA_HOST=${MYSQL_HOST}
      - PMA_PORT=${MYSQL_PORT}
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
      - PMA_ABSOLUTE_URI=http://localhost:${PHPMYADMIN_PORT:-8080}/
      - UPLOAD_LIMIT=256M
    networks:
      - osticket_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

# Network internal untuk komunikasi antar service
networks:
  osticket_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br_osticket

# Persistent volumes
volumes:
  osticket_db_data:
    driver: local
  osticket_logs:
    driver: local
  osticket_sessions:
    driver: local
